<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; background: #e6f4ff; padding: 20px; }
    h1 { text-align: center; color: #0b5394; }
    .profile-card { max-width: 600px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .profile-card p { font-size: 16px; margin: 8px 0; }
    .career-list p { font-weight: bold; margin: 5px 0; }
    .green { color: green; }
    .yellow { color: #e6b800; }
    .red { color: red; }
    #logoutBtn { margin-top: 15px; padding: 8px 15px; border: none; border-radius: 5px; background: #d32f2f; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <h1>My Profile</h1>

  <div class="profile-card">
    <p><strong>Name:</strong> <span id="name">Loading...</span></p>
    <p><strong>Email:</strong> <span id="email">Loading...</span></p>
    <p><strong>Last Updated:</strong> <span id="timestamp">Loading...</span></p>
    <p><strong>Top 3 Careers:</strong></p>
    <div class="career-list" id="career">Loading...</div>
    <button id="logoutBtn">Logout</button>
  </div>

  <script type="module" src="profile.js">
  import { auth, database } from "./firebase.js";
import { onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { ref, get } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const snap = await get(ref(database, "users/" + user.uid));
  const data = snap.val();

  // 🚫 BLOCK ADMIN FROM PROFILE PAGE
  if (data?.role === "admin") {
    window.location.href = "admin.html";
    return;
  }

  // ✅ NORMAL USER CONTINUES HERE
  document.getElementById("name").innerText = data.name;
  document.getElementById("email").innerText = data.email;
});
</script>
</body>
</html>
