<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Users</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f4f6f9;
}

h1 {
  text-align: center;
  color: #0b5394;
  margin-bottom: 20px;
}

/* Stats Boxes */
.stats-container {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.stat-box {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.stat-box:hover {
  transform: scale(1.03);
  background: #e3f2fd;
}

.stat-box h3 {
  margin: 0;
  color: #0288d1;
}

.stat-box p {
  font-size: 22px;
  font-weight: bold;
  margin-top: 5px;
}

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input, select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th {
  background: #0288d1;
  color: white;
}

tr:nth-child(even) {
  background: #e3f2fd;
}

.career-list {
  text-align: left;
  padding-left: 15px;
}

/* Buttons */
.btn {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin: 2px;
  color: white;
}

.btn-delete { background: #d32f2f; }
.btn-block { background: #f57c00; }
.btn-unblock { background: #388e3c; }
.btn-restore { background: #1976d2; }

#logoutBtn {
  float: right;
  background: #d32f2f;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Admin Panel - Users</h1>
<button id="logoutBtn">Logout</button>

<!-- Stats -->
<div class="stats-container">
  <div class="stat-box" onclick="showAllUsers()">
    <h3>Total Users</h3>
    <p id="totalUsers">0</p>
  </div>
  <div class="stat-box" onclick="showActiveUsers()">
    <h3>Active Users</h3>
    <p id="activeUsers">0</p>
  </div>
  <div class="stat-box" onclick="showBlockedUsers()">
    <h3>Blocked Users</h3>
    <p id="blockedUsers">0</p>
  </div>
  <div class="stat-box" onclick="showDeletedUsers()">
    <h3>Deleted Users</h3>
    <p id="deletedUsers">0</p>
  </div>
</div>

<!-- Search & Filter -->
<div class="controls">
  <input type="text" id="searchInput" placeholder="Search by name or email...">
  <select id="filterSelect">
    <option value="all">All Users</option>
    <option value="active">Active Users</option>
    <option value="blocked">Blocked Users</option>
    <option value="deleted">Deleted Users</option>
  </select>
</div>

<!-- Table -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Email</th>
  <th>Top 3 Careers</th>
  <th>Timestamp</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="userTableBody">
<tr><td colspan="5">Loading users...</td></tr>
</tbody>
</table>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const tableBody = document.getElementById("userTableBody");
const searchInput = document.getElementById("searchInput");
const filterSelect = document.getElementById("filterSelect");

let allUsers = [];

// 🔐 Admin Authentication
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const snap = await get(ref(database, "users/" + user.uid));
  const data = snap.val();

  if (!data || data.role !== "admin") {
    alert("Access Denied");
    window.location.href = "profile.html";
    return;
  }

  loadUsers();
});

// 📥 Load Users
function loadUsers() {
  const usersRef = ref(database, "users/");
  onValue(usersRef, (snapshot) => {
    const users = snapshot.val();
    allUsers = [];

    if (users) {
      Object.entries(users).forEach(([uid, user]) => {
        if (user.role !== "admin") {
          allUsers.push({ uid, ...user });
        }
      });
    }

    updateStats();
    renderUsers();
  });
}

// 📊 Update Stats
function updateStats() {
  const total = allUsers.length;
  const blocked = allUsers.filter(u => u.blocked && !u.deleted).length;
  const deleted = allUsers.filter(u => u.deleted).length;
  const active = allUsers.filter(u => !u.blocked && !u.deleted).length;

  document.getElementById("totalUsers").innerText = total;
  document.getElementById("blockedUsers").innerText = blocked;
  document.getElementById("activeUsers").innerText = active;
  document.getElementById("deletedUsers").innerText = deleted;
}

// 🖥️ Render Users
function renderUsers() {
  const searchText = searchInput.value.toLowerCase();
  const filter = filterSelect.value;

  let filteredUsers = allUsers.filter(user => {
    const name = (user.name || "").toLowerCase();
    const email = (user.email || "").toLowerCase();
    return name.includes(searchText) || email.includes(searchText);
  });

  if (filter === "active") filteredUsers = filteredUsers.filter(u => !u.blocked && !u.deleted);
  if (filter === "blocked") filteredUsers = filteredUsers.filter(u => u.blocked && !u.deleted);
  if (filter === "deleted") filteredUsers = filteredUsers.filter(u => u.deleted);

  tableBody.innerHTML = "";

  if (filteredUsers.length === 0) {
    tableBody.innerHTML = "<tr><td colspan='5'>No users found</td></tr>";
    return;
  }

  filteredUsers.forEach(user => {
    let careersHTML = "-";
    if (user.top3 && Array.isArray(user.top3)) {
      careersHTML = "<ul class='career-list'>";
      user.top3.forEach((c, i) => {
        let color = i === 0 ? "green" : i === 1 ? "orange" : "red";
        careersHTML += `<li style="color:${color}">${c.career} - ${c.percent}%</li>`;
      });
      careersHTML += "</ul>";
    }

    let timestamp = user.timestamp || user.createdAt || user.updatedAt || "-";
    let formattedTime = timestamp !== "-" ? new Date(timestamp).toLocaleString() : "-";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${user.name || "-"}</td>
      <td>${user.email || "-"}</td>
      <td>${careersHTML}</td>
      <td>${formattedTime}</td>
      <td>
        ${
          user.deleted
            ? `<button class="btn btn-restore" onclick="restoreUser('${user.uid}')">Restore</button>`
            : `
              <button class="btn btn-delete" onclick="deleteUser('${user.uid}')">Delete</button>
              ${
                user.blocked
                  ? `<button class="btn btn-unblock" onclick="toggleBlock('${user.uid}', false)">Unblock</button>`
                  : `<button class="btn btn-block" onclick="toggleBlock('${user.uid}', true)">Block</button>`
              }
            `
        }
      </td>
    `;
    tableBody.appendChild(tr);
  });
}

// ❌ Soft Delete User
window.deleteUser = async function(uid) {
  if (!confirm("Are you sure you want to delete this user?")) return;

  await update(ref(database, "users/" + uid), {
    deleted: true,
    deletedAt: Date.now()
  });

  alert("User moved to deleted list!");
};

// ♻️ Restore User
window.restoreUser = async function(uid) {
  await update(ref(database, "users/" + uid), { deleted: false });
  alert("User restored successfully!");
};

// 🚫 Block / Unblock User
window.toggleBlock = async function(uid, status) {
  await update(ref(database, "users/" + uid), { blocked: status });
  alert(status ? "User blocked!" : "User unblocked!");
};

// 🔍 Search & Filter Events
searchInput.addEventListener("input", renderUsers);
filterSelect.addEventListener("change", renderUsers);

// 📊 Stats Box Click Functions
window.showAllUsers = function() { filterSelect.value = "all"; renderUsers(); };
window.showActiveUsers = function() { filterSelect.value = "active"; renderUsers(); };
window.showBlockedUsers = function() { filterSelect.value = "blocked"; renderUsers(); };
window.showDeletedUsers = function() { filterSelect.value = "deleted"; renderUsers(); };

// 🚪 Logout
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});
</script>

</body>
</html>
