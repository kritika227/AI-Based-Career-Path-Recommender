<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Career Guidance System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #0b5394;
    }
    #logoutBtn {
      padding: 8px 15px;
      background: #d32f2f;
      color: white;
      border: none;
      cursor: pointer;
      float: right;
      margin-bottom: 20px;
    }
    #userInfo {
      background: #fff;
      padding: 15px;
      border: 1px solid #ccc;
      max-width: 600px;
      margin: 20px auto;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<h1>Welcome to Career Guidance System</h1>
<button id="logoutBtn">Logout</button>

<div id="userInfo">
  Loading user info...
</div>

<script type="module">
  import { auth, database } from "./firebase.js";
  import { onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { ref, get } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const userInfo = document.getElementById("userInfo");
  const logoutBtn = document.getElementById("logoutBtn");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    try {
      const userRef = ref(database, "users/" + user.uid);
      const snapshot = await get(userRef);

      if (!snapshot.exists()) {
        alert("User data not found!");
        await signOut(auth);
        window.location.href = "login.html";
        return;
      }

      const data = snapshot.val();

      // ✅ Admin redirect
      if (data.role === "admin") {
        window.location.href = "admin.html";
        return;
      }

      // ✅ Normal user view
      userInfo.innerHTML = `
        <b>Name:</b> ${data.name || "-"}<br>
        <b>Email:</b> ${data.email || "-"}<br>
        <b>Top 3 Careers:</b>
        <ul>
          ${data.top3 ? data.top3.map(c => `<li>${c.career} - ${c.percent}%</li>`).join('') : '-'}
        </ul>
        <b>Timestamp:</b> ${data.timestamp ? new Date(data.timestamp).toLocaleString() : "-"}
      `;

    } catch (error) {
      console.error("Error fetching user data:", error);
      alert("Something went wrong!");
    }
  });

  // 🚪 Logout
  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });
</script>

</body>
</html>
